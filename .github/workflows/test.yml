name: Java CI Test

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile code
      run: |
        mkdir -p bin
        javac -cp "lib/*" -d bin src/chatapp/*.java test/chatapp/*.java

    - name: Run tests
      run: |
        java -cp "bin:lib/*" org.junit.runner.JUnitCore chatapp.storedMessagesTest
